<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffe39d"/>
    <stop offset="1" stop-color="#ff7db8"/>
  </linearGradient>
  <radialGradient id="glow" cx="20%" cy="18%" r="80%">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="b"/>
    <feOffset in="b" dy="10" result="o"/>
    <feColorMatrix in="o" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.05 0 0 0 0 0.15 0 0 0 0.22 0" result="c"/>
    <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="800" height="520" rx="36" fill="url(#bg)"/>
<rect width="800" height="520" rx="36" fill="url(#glow)"/>
<g filter="url(#shadow)">
<rect x="220" y="92" width="360" height="280" rx="34" fill="rgba(255,255,255,.30)" stroke="rgba(255,255,255,.42)"/>
<rect x="248" y="120" width="304" height="224" rx="24" fill="rgba(255,255,255,.18)"/>
<g>
  <circle cx="305" cy="190" r="34" fill="#ff4f7f"/><circle cx="375" cy="166" r="30" fill="#ffb000"/>
  <circle cx="444" cy="205" r="32" fill="#44d9c8"/><circle cx="507" cy="175" r="28" fill="#845cff"/>
  <circle cx="331" cy="258" r="26" fill="#ffd84f"/><circle cx="408" cy="252" r="34" fill="#2ad1c9"/>
  <circle cx="485" cy="254" r="26" fill="#ff7db8"/>
</g>
<text x="72" y="452" font-size="36" font-weight="900" font-family="ui-sans-serif, system-ui" fill="#10203a">Candy Pop</text>
<text x="72" y="486" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui" fill="#30415b">Japan-style gummy pouch placeholder</text>
