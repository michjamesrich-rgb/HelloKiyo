    <feColorMatrix in="o" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.05 0 0 0 0 0.15 0 0 0 0.22 0" result="c"/>
    <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="800" height="520" rx="36" fill="url(#bg)"/>
<rect width="800" height="520" rx="36" fill="url(#glow)"/>
